<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移除手机自适应meta标签，保持原始尺寸 -->
    <title>共享账号（实时更新）</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .pwd-box {
            text-align: center;
            padding: 60px 20px;
        }
        .pwd-box input {
            padding: 12px 16px;
            font-size: 16px;
            width: 240px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .pwd-box button {
            padding: 12px 30px;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        /* 倒计时样式 */
        .countdown {
            background: #ff3b30;
            color: #fff;
            padding: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-radius: 8px;
            width: 776px; /* 和iframe同宽 */
            margin-left: auto;
            margin-right: auto;
        }
        /* 过期提示 */
        .expired-box {
            text-align: center;
            font-size: 22px;
            color: red;
            padding: 50px 20px;
            font-weight: bold;
        }
        /* 完全恢复你原本的iframe尺寸，固定不变 */
        .iframe-box {
            width: 800px;
            height: 2400px;
            overflow: hidden;
            border: 1px solid #ccc;
            margin: 0 auto;
        }
        .iframe-box iframe {
            width: 800px;
            height: 3650px;
            margin-top: -1320px;
            margin-left: 0px;
            border: none;
        }
        /* 标题样式和你原来的一样 */
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<script>
// ===================== 你只需要改下面这3个地方 =====================
const ACCESS_PASSWORD = "123456"; // 1. 访问密码
const IFRAME_URL = "shturl.cc/NO3YeDlpee3mwlC70ZkergZwqxEWwfLZ55kb1quXoLRiCY7NxTRTJ94FUoPlIL14ptx2cVuPk5d6nGD3nVbFCwkGEa3B3bdd6O4LdAWsa1PDQi12dZ6w89gEtWbUalToa5OxImNHSztQ4HqtibiQUTm86JqLTM"; // 2. 要嵌入的网页链接
// ================================================================

// 后端校验过期（Vercel API路径）
async function checkExpire() {
    try {
        const res = await fetch(`/api/time?t=${Date.now()}`);
        if (!res.ok) throw new Error("API请求失败");
        const data = await res.json();
        if (data.expired) {
            document.body.innerHTML = `<div class="expired-box">您的查看有效期已结束！</div>`;
            throw new Error("expired");
        }
        return data.left;
    } catch (e) {
        document.body.innerHTML = `<div class="expired-box">网络错误，请刷新重试</div>`;
        throw e;
    }
}

// 密码页面
document.write(`
<div class="pwd-box">
    <h3>请输入访问密码</h3>
    <input type="password" id="pwd" placeholder="输入密码">
    <br>
    <button onclick="verifyPassword()">确认进入</button>
</div>
`);

// 密码验证
async function verifyPassword() {
    const inputPwd = document.getElementById("pwd").value.trim();
    if (inputPwd !== ACCESS_PASSWORD) {
        alert("密码错误");
        return;
    }
    
    const leftTime = await checkExpire();
    
    // 完全恢复你原来的页面结构
    document.body.innerHTML = `
        <div class="countdown">剩余可查看时间：<span id="timeLeft">${formatTime(leftTime)}</span></div>
        <h2>共享账号，实时更新（刷新需要一点时间）</h2>
        <div class="iframe-box">
            <iframe src="${IFRAME_URL}" scrolling="no"></iframe>
        </div>
    `;
    
    // 倒计时
    let remaining = leftTime;
    const timer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
            clearInterval(timer);
            document.body.innerHTML = `<div class="expired-box">您的查看有效期已结束！</div>`;
            return;
        }
        document.getElementById("timeLeft").textContent = formatTime(remaining);
    }, 1000);
}

// 时间格式化
function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return `${h}时${m}分${s}秒`;
}

// 回车登录
document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") verifyPassword();
});
</script>
</body>
</html>
